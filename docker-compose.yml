# =============================================================================
# DISTRIBUTED AI NETWORK - Docker Compose Configuration
# Production-grade distributed computing platform
# =============================================================================

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER:-ai}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_secure_password}
  POSTGRES_DB: ${POSTGRES_DB:-ainetwork}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP: kafka:9092
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

services:
  # ===========================================================================
  # INFRASTRUCTURE - Message Queue
  # ===========================================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ai_kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ai_kafka_ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ai-network
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # INFRASTRUCTURE - Database
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: ai_postgres
    hostname: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-ainetwork}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai} -d ${POSTGRES_DB:-ainetwork}"]
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"

  # ===========================================================================
  # INFRASTRUCTURE - Cache / PubSub
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: ai_redis
    hostname: redis
    ports:
      - "6380:6379"
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--tcp-keepalive"
      - "300"
      - "--timeout"
      - "0"
    volumes:
      - redisdata:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped

  # ===========================================================================
  # APPLICATION - Main Server
  # ===========================================================================
  main-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ai_main_server
    ports:
      - "8020:8020"
    environment:
      <<: *common-env
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8020
      WORKER_TASK_TIMEOUT: 300
      VALIDATION_MATCH_REWARD_A: 0.05
      VALIDATION_MATCH_REWARD_B: 0.02
      VALIDATION_MISMATCH_PENALTY: 0.1
      GOLDEN_TASK_RATIO: 0.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ===========================================================================
  # APPLICATION - API Gateway
  # ===========================================================================
  api-gateway:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: ai_api_gateway
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      MAX_UPLOAD_SIZE: 104857600
      DEFAULT_CHUNK_SIZE: 50
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ===========================================================================
  # APPLICATION - Task Router
  # ===========================================================================
  router:
    build:
      context: ./services/router
      dockerfile: Dockerfile
    container_name: ai_router
    environment:
      <<: *common-env
      CONSUMER_GROUP: router-group
      INPUT_TOPIC: ai.tasks.v2
      CPU_TOPIC: ai.tasks.cpu
      GPU_TOPIC: ai.tasks.gpu
      GPU_THRESHOLD: 100
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ===========================================================================
  # APPLICATION - CPU Worker
  # ===========================================================================
  cpu-worker:
    build:
      context: ./services/cpu_worker
      dockerfile: Dockerfile
    # container_name removed - not compatible with replicas
    environment:
      <<: *common-env
      CONSUMER_GROUP: cpu-worker-group
      INPUT_TOPIC: ai.tasks.cpu
      OUTPUT_TOPIC: ai.results.v2
      WORKER_TYPE: cpu
      USE_AI_MODELS: "false"  # Set to "true" to enable HuggingFace models (requires more RAM)
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 4G  # Increase for AI models

  # ===========================================================================
  # APPLICATION - GPU Worker (stub for now)
  # ===========================================================================
  gpu-worker:
    build:
      context: ./services/gpu_worker
      dockerfile: Dockerfile
    container_name: ai_gpu_worker
    environment:
      <<: *common-env
      CONSUMER_GROUP: gpu-worker-group
      INPUT_TOPIC: ai.tasks.gpu
      OUTPUT_TOPIC: ai.results.v2
      WORKER_TYPE: gpu
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ===========================================================================
  # APPLICATION - Reducer
  # ===========================================================================
  reducer:
    build:
      context: ./services/reducer
      dockerfile: Dockerfile
    container_name: ai_reducer
    environment:
      <<: *common-env
      CONSUMER_GROUP: reducer-group
      INPUT_TOPIC: ai.results.v2
      EVENTS_TOPIC: ai.events.v1
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ===========================================================================
  # APPLICATION - Frontend Dashboard
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_frontend
    ports:
      - "3000:80"
    depends_on:
      - main-server
      - api-gateway
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  default:
    name: ai_network
    driver: bridge
